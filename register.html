    <form class="register-card">

        <h2>Create Account</h2>
        <div id="regname">
            <div>
                <label for="name">First Name</label>
                <input type="text" placeholder="First Name" required>
            </div>
            <div>
                <label for="lastname">Last Name</label>
                <input type="text" placeholder="Last Name">
            </div>
        </div>
        <div id="regcontact">
            <div>
                <label for="email">Email</label>
                <input type="email" placeholder="Email" required>
            </div>
            <div>
                <label for="number">Contact Number</label>
                <input type="text" placeholder="Phone Number" required>
            </div>
        </div>

        <!-- Gender -->
        <br>
        <div class="gender-box">
            <label>Gender:</label>
            <div class="gender-options">
                <label><input type="radio" name="gender" class="selgender"> Male</label>
                <label><input type="radio" name="gender" class="selgender"> Female</label>
            </div>
        </div>



        <!-- Password -->
        <div class="password-box">
            <div><label for="">Password</label>
                <input type="password" placeholder="Password" required>
            </div>
            <div><label for="">Confirm password</label>
                <input type="password" placeholder="Confirm Password" required>
            </div>
        </div>
        <!-- Referral -->
        <div class="referralcodebox">
            <input type="text" placeholder="Referral Code (Optional)">
        </div>
        <!-- Terms -->
        <div class="terms">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to Terms & Conditions</label>
        </div>

        <button type="submit">Register</button>

        <p class="login-link">
            Already have an account?
            <a href="login.html">Sign In </a>
        </p>

    </form>
